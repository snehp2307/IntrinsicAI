<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Intrinsic AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
<style>
  .auth-wrap{display:flex;justify-content:center;align-items:center;min-height:90vh;padding:2rem}
  .auth-card{background:#0c1019;border:1px solid #1a2030;border-radius:14px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 8px 40px rgba(0,0,0,.4)}
  .auth-logo{display:flex;align-items:center;gap:.5rem;font-weight:700;font-size:1.1rem;margin-bottom:2rem;letter-spacing:-.01em}
  .auth-logo .dot{width:8px;height:8px;background:linear-gradient(135deg,#3b82f6,#818cf8);border-radius:2px;transform:rotate(45deg)}
  .auth-logo .accent{background:linear-gradient(135deg,#60a5fa,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .auth-title{font-size:1.5rem;font-weight:700;margin-bottom:.3rem;letter-spacing:-.02em}
  .auth-sub{color:#8892a4;margin-bottom:1.75rem;font-size:.88rem}
  .form-group{margin-bottom:1.15rem}
  .form-group label{display:block;margin-bottom:.4rem;font-size:.78rem;color:#8892a4;font-weight:600;letter-spacing:.03em}
  .form-group input{width:100%;padding:.75rem 1rem;background:#060810;border:1px solid #1a2030;border-radius:8px;color:#e4e8ef;font-family:inherit;font-size:.9rem;transition:border-color .25s,box-shadow .25s}
  .form-group input:focus{outline:none;border-color:rgba(59,130,246,.5);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
  .btn-full{width:100%;padding:.8rem;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.92rem;font-weight:600;cursor:pointer;margin-top:.5rem;transition:opacity .2s,transform .15s}
  .btn-full:hover{opacity:.9;transform:translateY(-1px)}
  .auth-footer{text-align:center;margin-top:1.5rem;color:#8892a4;font-size:.85rem}
  .auth-footer a{color:#60a5fa;font-weight:500;transition:color .2s}
  .auth-footer a:hover{color:#93c5fd}
  .alert{padding:.7rem 1rem;border-radius:8px;margin-bottom:.75rem;font-size:.85rem;border:1px solid}
  .alert-danger{background:#ef444412;border-color:#ef444430;color:#ef4444}
  .alert-success{background:#22c55e12;border-color:#22c55e30;color:#22c55e}
  .alert-warning{background:#f59e0b12;border-color:#f59e0b30;color:#f59e0b}
  .alert-info{background:#3b82f612;border-color:#3b82f630;color:#3b82f6}
</style>
</head>
<body>
<div class="noise"></div>
<nav class="navbar">
  <a href="/" class="nav-brand" style="text-decoration:none">
    <span style="width:8px;height:8px;background:linear-gradient(135deg,#3b82f6,#818cf8);border-radius:2px;transform:rotate(45deg);display:inline-block"></span>
    <span class="brand-text">Intrinsic<span class="brand-accent">AI</span></span>
  </a>
  <div class="nav-right"><a href="/" class="nav-link">Home</a></div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to your Intrinsic AI account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="/login">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@example.com" required autofocus/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" placeholder="Your password" required/>
      </div>
      <button type="submit" class="btn-full">Sign In</button>
    </form>

    <div class="auth-footer">
      New here? <a href="/register">Create an account</a>
    </div>
  </div>
</div>
</body>
</html>
